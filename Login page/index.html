<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | AuthPortal</title>
<!-- Fonts: Hanken Grotesk -->
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="login.css">
</head>
<body>
<main class="login-card">
<!-- Heading -->
<div class="header">
<h1>Login</h1>
<p>Please enter your credentials to access your account.</p>
</div>
<!-- Login Form -->
<form id="loginForm">
<!-- Email Field -->
<div class="form-group">
<label for="email">Email Address</label>
<div class="input-container">
<input id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="form-group">
<div class="label-row">
<label for="password">Password</label>
<a class="forgot-password" href="#">Forgot password?</a>
</div>
<div class="input-container">
<input id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="password-toggle" id="togglePassword" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="remember-me">
<input id="remember" type="checkbox"/>
<label for="remember">Remember me for 30 days</label>
</div>
<!-- Action Button -->
<button class="btn-primary" id="submitBtn" type="submit">
                Login
            </button>
</form>
<!-- Social Login Divider -->
<div class="divider">
<span>Or continue with</span>
</div>
<!-- Social Login Button -->
<button class="btn-google">
<svg fill="none" height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
            Continue with Google
        </button>
<!-- Sign Up Footer -->
<p class="footer-text">
            Don't have an account? 
            <a href="#">Create an account</a>
</p>
</main>
</body></html>
